<!DOCTYPE html>
<html>
<head>
    <title>Heart Disease Prediction</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            background: white;
            width: 40%;
            margin: 50px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.2);
        }

        h2 {
            color: #333;
        }

        input {
            width: 80%;
            padding: 10px;
            margin: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background: #2575fc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #1a5edb;
        }

        .result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }
    </style>

</head>

<body>

<div class="container">
    <h2>❤️ Heart Disease Prediction</h2>

    <form action="/predict" method="post">

        <input name="age" placeholder="Age" required>
        <input name="sex" placeholder="Sex (1=M, 0=F)" required>
        <input name="cp" placeholder="Chest Pain Type (0-3)" required>
        <input name="trestbps" placeholder="Blood Pressure" required>
        <input name="chol" placeholder="Cholesterol" required>
        <input name="fbs" placeholder="Fasting Sugar (1/0)" required>
        <input name="restecg" placeholder="ECG (0-2)" required>
        <input name="thalach" placeholder="Max Heart Rate" required>
        <input name="exang" placeholder="Exercise Angina (1/0)" required>
        <input name="oldpeak" placeholder="Oldpeak" required>
        <input name="slope" placeholder="Slope (0-2)" required>
        <input name="ca" placeholder="CA (0-3)" required>
        <input name="thal" placeholder="Thal (1-3)" required>

        <br>
        <button type="submit">Predict</button>
    </form>

    <div class="result">
        {{ prediction_text }}
    </div>
</div>

</body>
</html>
